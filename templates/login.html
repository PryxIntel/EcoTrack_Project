{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-right-to-bracket text-success fa-3x mb-2"></i>
                        <h2 class="fw-bold text-dark">Welcome Back</h2>
                        <p class="text-muted small">Access your personal carbon tracking ledger</p>
                    </div>
                    
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-muted"></i></span>
                                <input type="email" class="form-label form-control" id="email" name="email" placeholder="enter registered email" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" class="form-label form-control" id="password" name="password" placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm">Secure Login</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="mb-0 small text-muted">New to the platform? <a href="{{ url_for('register') }}" class="text-success fw-bold text-decoration-none">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
